apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techtrends-prod
spec:
  project: default
  source:
    repoURL: https://github.com/Hu-in/nd064_course_1.git
    targetRevision: main
    path: project/techtrends/helm
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated: {}
